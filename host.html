<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>FileEquinox</title>
		<link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
		<style>
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
					sans-serif;
				background: #1e1e2e;
				color: #cdd6f4;
				padding: 20px;
			}
			h2 {
				color: #89b4fa;
				border-bottom: 1px solid #45475a;
				padding-bottom: 10px;
			}
			ul {
				list-style-type: none;
				padding-left: 20px;
			}
			li {
				margin: 5px 0;
				line-height: 1.5;
			}
			.folder {
				color: #f9e2af;
				cursor: pointer;
				font-weight: bold;
				user-select: none;
			}
			.folder::before {
				content: '📁 ';
			}
			.folder.open::before {
				content: '📂 ';
			}
			.file {
				color: #a6e3a1;
				text-decoration: none;
			}
			.file::before {
				content: '📄 ';
			}
			.file:hover {
				text-decoration: underline;
				color: #89b4fa;
			}
			.hidden {
				display: none;
			}
		</style>
	</head>
	<body>
		<h2>File Equinox</h2>
		<div id="explorer">Loading directory...</div>

		<script>
			async function fetchDirectoryItems(path = '') {
				try {
					let response = await fetch(
						`/api/files?path=${encodeURIComponent(path)}`
					)
					return await response.json()
				} catch (err) {
					return []
				}
			}

			async function buildTree(targetElement, currentPath = '') {
				const files = await fetchDirectoryItems(currentPath)

				if (!files || files.length === 0) {
					targetElement.innerHTML =
						"<li style='color:#6c7086;'>[Empty Folder]</li>"
					return
				}

				const ul = document.createElement('ul')

				files.forEach((item) => {
					const li = document.createElement('li')
					const itemRelativePath = currentPath
						? `${currentPath}/${item.name}`
						: item.name

					if (item.type === 'directory') {
						li.classList.add('folder')
						li.textContent = item.name

						const subContainer = document.createElement('div')
						subContainer.classList.add('hidden')
						li.appendChild(subContainer)

						li.addEventListener('click', async (e) => {
							e.stopPropagation()
							li.classList.toggle('open')
							subContainer.classList.toggle('hidden')

							if (subContainer.children.length === 0) {
								subContainer.innerHTML =
									'<li>Loading directory...</li>'
								await buildTree(subContainer, itemRelativePath)
								if (
									subContainer.firstChild &&
									subContainer.firstChild.textContent ===
										'Loading directory...'
								) {
									subContainer.removeChild(
										subContainer.firstChild
									)
								}
							}
						})
					} else {
						const a = document.createElement('a')
						a.classList.add('file')
						a.href = `/download?file=${encodeURIComponent(itemRelativePath)}`
						a.textContent = item.name
						a.setAttribute('download', '')
						li.appendChild(a)
					}
					ul.appendChild(li)
				})

				targetElement.innerHTML = ''
				targetElement.appendChild(ul)
			}

			document.addEventListener('DOMContentLoaded', () => {
				buildTree(document.getElementById('explorer'))
			})
		</script>
	</body>
</html>
