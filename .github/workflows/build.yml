name: Build Desktop Application

on:
  push:
    branches:
      - main       # Triggers whenever you push code to main branch
  workflow_dispatch: # Allows you to manually trigger the build from GitHub UI

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # Runs two separate builds simultaneously on native Windows & Ubuntu runners
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron App
        run: npx electron-builder
        env:
          # Necessary for GitHub API interactions if you automate releases later
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-builds
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.snap
            dist/*.deb